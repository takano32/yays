    概要（省略可）<BR><TEXTAREA ROWS="12" COLS="52" NAME="summary">ついにアノ人の秘密が明らかに!?

ISBN:978-4-8401-2668-7

女の子に変身して戦う「ケンプファー」となってしまった平凡な男子高校生・瀬能ナツル。赤と青、二つの争いだったはずが、いつの間にやら白のケンプファーとやらまであらわれて、赤青ＶＳ白の戦いに。平穏な日々を送りたいナツルの毎日はもう大変！　しかも、ナツル達に敵対する白のケンプファーの黒幕は、憧れの同級生・沙倉楓。ショックを受けるナツルに楓が言う「ナツルさんを手に入れた方が勝ちなんです。だからナツルさん、私達と一緒にいましょう」——って沙倉さん、その手に持った剣と銃は!?　大人気の学園ラブコメバトル風味、いよいよ物語の謎が明かされ始める中、あの人がついにナツルに告白!?　なドキドキハラハラの第9巻！</TEXTAREA><BR></TD></TR></TABLE>

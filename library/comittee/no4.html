<p><FONT COLOR="#FF0000"><B>CGI文庫システム</B></FONT><BR><BR>
無事にこのシステムも21世紀を迎えられました。別にCGI化したからと、見た目が変わるわけじゃないので、どこがどう変わったのか運営委員以外よく分かってないでしょうけど。<BR>
CGIによるファイルアップロードシステムを持ったホームページの管理、ってのは技術的にはやれることは分かってたんだけど、まさか自分が作る破目になるとは思ってもみませんでした。別にプログラム書くのが仕事じゃないので、作りながら試行錯誤。結果ソースはつぎはぎだらけ。今のところ大した事故もなく動いていてますけど、明日には何か起こらないかとドキドキ、なのであります。</p>

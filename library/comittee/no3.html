<div align="center"><a href="profile3.html" target="column">◆　八重洲　◆</a>
<font size="2" color="red">(00/11/22)</font></div>
<p>　最近は、勝ち気っ子と可逆っ子がお気に入りです。勝ち気ッコてのは、女の子化したにも関わらずあくまで強気な少年のこと。逆に女の子の立場を利用してブイブイいわせちゃったりするの。困惑したり恥じ入ったりするのも可愛いけど、世の中、萌えはそれだけじゃないってことで。可逆っ子てのは、少年と少女を行ったり来たりするタイプ。代表例は乱馬かな。可逆っ子のお話はストーリーが面白くなるので好きなのですよ。というか、文庫のお話って変わりっぱパターンが多すぎ！（笑）</p>

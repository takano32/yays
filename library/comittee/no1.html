<P><FONT COLOR="#FF0000"><B>　掲示板一時停止の理由</B></FONT><BR><BR>
掲示板の一時停止理由は、掲示板の適正かつ潤沢な運営に支障を来す行為が有った為、運営委員会では削除等の処置を執っておりましたが、やむを得ず一時停止をさせて頂きました。<BR><BR>
今後も目に余る書き込みについては、削除させて頂きます。と共に書き込み者の調査も平行して行わせて頂きます。<BR>
場合によっては、通告（警告）・公表する処置をとって行きます。<BR><BR>
皆さまには多大な迷惑をお掛け致しましたが、この度掲示板の復活に際してご理解とご協力よろしくお願い致します。<BR>
　＜（＿ ＿）＞</P>

<font size="+4"><center>月に還る</font><BR>
作：角さん<br></center>
<BR>
<BR>
　月は、囁く<br>
さぁ、あなたの本当の姿を見せてごらん・・・<br>
あなたの心のままの本当の姿を・・・<br>
肉体という、檻を破り<br>
その、二枚の翼を羽ばたかせ、私の元へ・・・<br>
ここは、あなたの帰るべき場所・・・<br>
さぁ、早く私の元へ・・・<br>
　少年は、天を仰ぎ囁く<br>
・・・今行くよ、母さん・・・<br>
　天使は、その白く輝く二枚の羽を羽ばたかせ、天に飛び立つ<br>
　自分の帰るべき故郷に向かって・・・<br>
